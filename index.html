<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Stock Buy Zone Calculator</title>
  </head>
  <body>
    <nav>
      <a href="#"> About</a>
      <a href="#"> Resources</a>
    </nav>
    <div class="header-div">
      <h1>Stock Buy Zone Calculator</h1>
      <p>Caculate the best buy zone to buy stock.</p>
    </div>
    <div class="form-container" id="form-container">
      <form id="stock-form">
        <label for="ticker">Ticker Symbol</label><br />
        <input type="text" id="ticker" placeholder="AAPL" required />
        <button type="submit">Caculate</button>
      </form>
    </div>
    <div class="loading" id="loading" style="display: none">Loading...</div>
    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="top-results">
        <p>Ticker: <span id="result-symbol"></span></p>
        <p>Current Price: $<span id="result-price"></span></p>
      </div>
      <div class="top-results">
        <p>Current High: $<span id="result-high"></span></p>
        <p>6-Month Low: $<span id="result-low"></span></p>
      </div>
      <hr />
      <div class="bottom-results">
        <p>Buy Zone 1 (Moderate): $<span id="result-zone1"></span></p>
        <p>Buy Zone 2 (Aggressive): $<span id="result-zone2"></span></p>
      </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
