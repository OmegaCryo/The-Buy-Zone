<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <title>Stock Buy Zone Calculator</title>
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="#"> About</a>
      <a href="resources.html"> Resources</a>
    </nav>
    <div class="header-div">
      <h1>Buy Zone <span class="text-color">Calculator</span></h1>
      <p>Enter the stock symbol, caculate the best buy zone.</p>
    </div>
    <hr />
    <div class="form-container" id="form-container">
      <form id="stock-form">
        <div class="input-container">
          <label for="ticker" class="ticker-symbol">Ticker Symbol</label><br />
          <span class="material-icons">search</span>
          <input type="text" id="ticker" placeholder="AAPL" required />
        </div>
        <div class="button-container" id="button-container">
          <button type="submit">Caculate</button>
        </div>
      </form>
    </div>
    <div class="loading" id="loading" style="display: none">Loading...</div>
    <div class="error" id="error"></div>

    <div class="results" id="results" style="display: none">
      <h4>Results</h4>
      <div class="top-results">
        <p>Ticker: <span id="result-symbol"></span></p>
        <p>Current Price: $<span id="result-price"></span></p>
      </div>
      <div class="top-results">
        <p>Current High: $<span id="result-high"></span></p>
        <p>6-Month Low: $<span id="result-low"></span></p>
      </div>
      <div class="bottom-results">
        <p>Buy Zone 1 (Moderate): $<span id="result-zone1"></span></p>
        <p>Buy Zone 2 (Aggressive): $<span id="result-zone2"></span></p>
      </div>
    </div>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
